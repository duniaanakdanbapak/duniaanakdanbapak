<!-- 🔥 PAGE PRODUK -->
<section class="container py-5">

  <h2 class="text-center mb-5 fw-bold">Produk</h2>

  <div class="row">

    <!-- 🔹 SIDEBAR -->
    <div class="col-lg-3 mb-4">
      <div class="filter-box p-3">

        <h6 class="fw-bold mb-3">Filter</h6>

        <!-- Category -->
        <div class="mb-3">
          <strong>Kategori</strong><br>
          <input type="radio" name="cat" onclick="setCategory('All')" checked> All<br>
          <input type="radio" name="cat" onclick="setCategory('Figures')"> Figures<br>
          <input type="radio" name="cat" onclick="setCategory('TCG')"> Trading Card Game<br>
          <input type="radio" name="cat" onclick="setCategory('Accessories')"> Aksesoris
        </div>

        <!-- Sub Filter -->
        <div id="subFilter"></div>

      </div>
    </div>

    <!-- 🔹 CONTENT -->
    <div class="col-lg-9">

      <!-- Top bar -->
      <div class="d-flex flex-column flex-md-row justify-content-between gap-3 mb-4">

        <input type="text" id="searchInput" class="form-control" placeholder="Cari produk...">

        <select class="form-select w-md-25">
          <option>Sort By</option>
          <option>Harga Termurah</option>
          <option>Harga Tertinggi</option>
        </select>

      </div>

      <!-- Product Grid -->
      <div class="row g-4" id="productList"></div>

    </div>

  </div>
</section>
<!-- 🔍 PRODUCT DETAIL MODAL -->
<div class="modal fade" id="productModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-body p-4">
        <div class="row">

          <!-- IMAGE -->
          <div class="col-md-6 text-center">
            <img id="modalImage" class="img-fluid modal-img">
          </div>

          <!-- INFO -->
          <div class="col-md-6">

            <h4 id="modalName" class="fw-bold"></h4>
            <p id="modalCategory" class="text-muted"></p>

            <h5 id="modalPrice" class="fw-bold mt-2"></h5>
            <p id="modalStock" class="mt-2"></p>

            <hr>

            <p class="small text-muted">
              Produk koleksi berkualitas tinggi, cocok untuk kolektor maupun hadiah spesial.
            </p>

            <a id="modalBuyBtn" target="_blank" class="btn btn-dark w-100">
              <i class="bi bi-cart"></i> Beli Sekarang
            </a>

          </div>

        </div>
      </div>

    </div>
