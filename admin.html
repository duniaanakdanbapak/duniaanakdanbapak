<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Admin - Dunia Anak Dan Bapak</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;600;700&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css">

  <!-- Icon -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>

<body>

<!-- 🔝 NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-4">
  <span class="navbar-brand fw-bold">Admin Panel</span>
  <span class="text-white">Dunia Anak Dan Bapak</span>
</nav>

<!-- 📦 DASHBOARD -->
<div class="container py-5">

  <h2 class="mb-4">Dashboard Produk</h2>

  <div class="row g-4">

    <!-- ➕ ADD PRODUCT CARD -->
    <div class="col-lg-3 col-md-6">
      <div class="card admin-card add-card text-center" data-bs-toggle="modal" data-bs-target="#addProductModal">
        <div class="card-body d-flex flex-column justify-content-center align-items-center">
          <i class="bi bi-plus-circle display-4"></i>
          <h5 class="mt-3">Tambah Produk</h5>
        </div>
      </div>
    </div>

    <!-- 📦 PRODUCT LIST -->
    <div id="adminProductList" class="row g-4"></div>

  </div>
</div>

<!-- ➕ MODAL TAMBAH PRODUK -->
<div class="modal fade" id="addProductModal">
  <div class="modal-dialog">
    <div class="modal-content p-3">

      <h5 class="mb-3">Tambah Produk</h5>

      <input id="name" class="form-control mb-2" placeholder="Nama Produk">
      <input id="price" type="number" class="form-control mb-2" placeholder="Harga">

      <select id="category" class="form-control mb-2">
        <option>Figures</option>
        <option>TCG</option>
        <option>Accessories</option>
      </select>

      <input id="sub" class="form-control mb-2" placeholder="Sub Category">

      <select id="stock" class="form-control mb-3">
        <option>READY STOCK</option>
        <option>LIMITED STOCK</option>
        <option>OUT OF STOCK</option>
      </select>

      <button class="btn btn-dark w-100" onclick="addProduct()">Simpan</button>

    </div>
  </div>
</div>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
let editIndex = -1;
let products = [
  {
    name: "Luffy Figure",
    category: "Figures",
    sub: "Blokees",
    price: 250000,
    stock: "READY STOCK",
    image: "assets/img/2.png"
  }
];

// RENDER ADMIN PRODUCT
function renderAdminProducts() {
  const list = document.getElementById("adminProductList");
  list.innerHTML = "";

  products.forEach((p, index) => {
    list.innerHTML += `
      <div class="col-lg-3 col-md-6">
        <div class="card product-card">

          <img src="${p.image}" class="product-img">

          <div class="card-body text-center">
            <h6>${p.name}</h6>
            <p class="small text-muted">${p.category}</p>
            <strong>Rp ${p.price.toLocaleString()}</strong>

            <div class="mt-3 d-flex gap-2 justify-content-center">
              <button class="btn btn-warning btn-sm" onclick="editProduct(${index})">
                <i class="bi bi-pencil"></i>
              </button>

              <button class="btn btn-danger btn-sm" onclick="deleteProduct(${index})">
                <i class="bi bi-trash"></i>
              </button>
            </div>

          </div>
        </div>
      </div>
    `;
  });
}

// ADD PRODUCT
function addProduct() {
  const newProduct = {
    name: document.getElementById("name").value,
    price: parseInt(document.getElementById("price").value),
    category: document.getElementById("category").value,
    sub: document.getElementById("sub").value,
    stock: document.getElementById("stock").value,
    image: "assets/img/1.png"
  };

  if (editIndex === -1) {
    // ➕ TAMBAH BARU
    products.push(newProduct);
  } else {
    // ✏️ UPDATE DATA
    products[editIndex] = newProduct;
    editIndex = -1;
  }

  renderAdminProducts();

  bootstrap.Modal.getInstance(document.getElementById('addProductModal')).hide();

  // reset form
  document.getElementById("name").value = "";
  document.getElementById("price").value = "";
  document.getElementById("sub").value = "";
}

// DELETE
function editProduct(index) {
  const p = products[index];

  editIndex = index;

  document.getElementById("name").value = p.name;
  document.getElementById("price").value = p.price;
  document.getElementById("category").value = p.category;
  document.getElementById("sub").value = p.sub;
  document.getElementById("stock").value = p.stock;

  new bootstrap.Modal(document.getElementById('addProductModal')).show();
}

// INIT
renderAdminProducts();
</script>

</body>
</html>
